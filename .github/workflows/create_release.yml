name: Create Release and Update Repository

# Push a tag like v1.0.0.1 to build the plugin, publish a GitHub release with
# latest.zip, and update pluginmaster.json so the custom repo serves the update.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile dalamud.zip
          Expand-Archive -Force dalamud.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore
        run: dotnet restore SnazzyP4.sln

      - name: Build
        run: dotnet build SnazzyP4.sln -c Release --no-restore

      - name: Stage packaged plugin
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Recurse -Filter latest.zip -Path SnazzyP4/bin/x64/Release | Select-Object -First 1
          if (-not $zip) { throw "latest.zip was not produced by the build." }
          Copy-Item $zip.FullName -Destination latest.zip -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.zip
          draft: false
          prerelease: false

      - name: Update pluginmaster.json
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $link = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/latest.zip"
          $pluginMaster = Get-Content pluginmaster.json -Raw | ConvertFrom-Json
          $entry = $pluginMaster[0]
          $entry.AssemblyVersion = $version
          $entry.DownloadLinkInstall = $link
          $entry.DownloadLinkTesting = $link
          $entry.DownloadLinkUpdate = $link
          $entry.LastUpdate = [string][long](Get-Date -UFormat %s)
          $pluginMaster | ConvertTo-Json -Depth 10 -AsArray | Set-Content pluginmaster.json -Encoding UTF8

      - name: Commit updated pluginmaster.json
        uses: EndBug/add-and-commit@v9
        with:
          add: pluginmaster.json
          message: "Update pluginmaster.json for ${{ github.ref_name }}"
          default_author: github_actions
